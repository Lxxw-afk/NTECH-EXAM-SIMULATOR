<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poste informatique saisi</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #0b1220;
      color: white;
    }

    .hidden {
      display: none !important;
    }

    button {
      font: inherit;
    }

    /* =========================
       ÉCRAN DE CONNEXION
    ========================= */
    #login-screen {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(135deg, rgba(11,18,32,0.55), rgba(20,30,48,0.45)),
        url("assets/login-screen.jpg") center/cover no-repeat;
    }

    .login-box {
      width: 100%;
      max-width: 520px;
      padding: 32px 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .session-name {
      font-size: 34px;
      font-weight: 500;
      color: #ffffff;
      margin-bottom: 28px;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
    }

    .password-row {
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 10px;
      background: rgba(7, 18, 58, 0.72);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      margin-bottom: 18px;
    }

    .lock-icon {
      font-size: 22px;
      line-height: 1;
      opacity: 0.9;
      flex-shrink: 0;
    }

    .password-row input {
      width: 100%;
      border: none;
      background: transparent;
      color: white;
      font-size: 16px;
      outline: none;
    }

    .password-row input::placeholder {
      color: rgba(255,255,255,0.62);
    }

    .login-box button {
      width: 100%;
      max-width: 420px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #2f5df0, #3a6bff);
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 10px 28px rgba(32, 84, 255, 0.28);
    }

    .login-box button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .login-links {
      margin-top: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      color: rgba(255,255,255,0.72);
      font-size: 14px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    .login-links a {
      color: rgba(255,255,255,0.78);
      text-decoration: none;
    }

    .login-links a:hover {
      text-decoration: underline;
    }

    #error-message {
      min-height: 20px;
      margin-top: 12px;
      color: #f87171;
      font-size: 14px;
    }

    /* =========================
       BUREAU
    ========================= */
    #desktop-screen {
      width: 100%;
      height: 100%;
      position: relative;
      background: url("assets/desktop-bg.png") center/cover no-repeat;
    }

    .desktop-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.08);
      pointer-events: none;
    }

    .desktop-icons {
      position: absolute;
      top: 28px;
      left: 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      z-index: 2;
    }

    .desktop-icon {
      width: 92px;
      text-align: center;
      cursor: pointer;
      user-select: none;
    }

    .desktop-icon .emoji {
      font-size: 38px;
      margin-bottom: 6px;
      display: block;
    }

    .desktop-icon .label {
      font-size: 13px;
      line-height: 1.3;
      text-shadow: 0 2px 8px rgba(0,0,0,0.55);
    }

    .window {
      position: absolute;
      top: 100px;
      left: 180px;
      width: 900px;
      max-width: calc(100vw - 220px);
      min-height: 420px;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      z-index: 5;
    }

    .window-header {
      height: 46px;
      background: rgba(30, 41, 59, 0.95);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .window-header h2 {
      font-size: 15px;
      color: #f8fafc;
      font-weight: 600;
    }

    .close-btn {
      border: none;
      background: #ef4444;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .window-content {
      padding: 18px;
      color: #e2e8f0;
    }

    .folder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
      margin-top: 8px;
    }

    .folder-item {
      padding: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .folder-item:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-1px);
    }

    .folder-item span {
      display: block;
    }

    .folder-item .emoji {
      font-size: 34px;
      margin-bottom: 8px;
    }

    .folder-item .name {
      font-size: 14px;
    }

    .file-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 16px;
      margin-top: 14px;
      white-space: pre-line;
      line-height: 1.6;
      font-size: 14px;
    }

    .status-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 18px;
      margin-top: 12px;
    }

    .status-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #f8fafc;
    }

    .status-text {
      color: #cbd5e1;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .status-btn {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .usb-notice {
      position: absolute;
      right: 18px;
      bottom: 64px;
      z-index: 12;
      background: rgba(15, 23, 42, 0.94);
      border: 1px solid rgba(255,255,255,0.08);
      color: #f8fafc;
      padding: 12px 14px;
      border-radius: 12px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.28);
      font-size: 14px;
    }

    /* =========================
       TASKBAR WINDOWS STYLE
    ========================= */
    .taskbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 52px;
      background: rgba(8, 12, 20, 0.72);
      border-top: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      z-index: 3;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 14px;
    }

    .taskbar-left {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .taskbar-center {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .taskbar-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 14px;
      color: #f1f5f9;
      font-size: 12px;
      min-width: 0;
    }

    .taskbar-icon {
      width: 38px;
      height: 38px;
      border: none;
      background: transparent;
      border-radius: 10px;
      color: white;
      font-size: 19px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .taskbar-icon:hover {
      background: rgba(255,255,255,0.12);
    }

    .taskbar-icon.active::after {
      content: "";
      position: absolute;
      bottom: 4px;
      width: 14px;
      height: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
    }

    .windows-logo {
      width: 16px;
      height: 16px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
    }

    .windows-logo span {
      display: block;
      background: #7dd3fc;
      border-radius: 1px;
    }

    .taskbar-time {
      text-align: right;
      line-height: 1.2;
      white-space: nowrap;
    }

    .taskbar-tray {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #e2e8f0;
      font-size: 14px;
    }

    /* =========================
       MINI JEU HACK STYLE
    ========================= */
    .hack-screen {
      background: linear-gradient(180deg, #0a2f88 0%, #081930 22%, #020202 100%);
      border-radius: 18px;
      padding: 14px;
      border: 1px solid rgba(86, 145, 255, 0.24);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .hack-panel {
      background: #020202;
      min-height: 560px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.04);
      padding: 18px 22px 24px;
      position: relative;
      overflow: hidden;
    }

    .hack-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .hack-header-left {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .hack-badge {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #8dd8ff, #1d4ed8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(59,130,246,0.55);
    }

    .hack-heading {
      line-height: 1.05;
    }

    .hack-heading-main {
      color: #62d8ff;
      font-size: 22px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hack-heading-sub {
      color: #7fb2d9;
      font-size: 13px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .hack-signal {
      display: flex;
      gap: 4px;
      align-items: flex-end;
      height: 34px;
      margin-top: 4px;
    }

    .hack-signal span {
      width: 9px;
      background: #34d3ff;
      border-radius: 1px;
      box-shadow: 0 0 8px rgba(52,211,255,0.35);
    }

    .hack-signal span:nth-child(1) { height: 12px; }
    .hack-signal span:nth-child(2) { height: 18px; }
    .hack-signal span:nth-child(3) { height: 24px; }
    .hack-signal span:nth-child(4) { height: 31px; }
    .hack-signal span:nth-child(5) { height: 37px; background: #6b7280; box-shadow: none; }

    .hack-ip {
      text-align: center;
      color: #ff3b30;
      font-size: 62px;
      line-height: 1;
      margin-top: 8px;
      letter-spacing: 2px;
      font-weight: 500;
      text-shadow: 0 0 12px rgba(255,59,48,0.18);
    }

    .hack-timer {
      text-align: center;
      color: #16d35f;
      font-size: 30px;
      margin-top: 22px;
      margin-bottom: 26px;
      font-weight: 600;
      font-family: Consolas, monospace;
      text-shadow: 0 0 12px rgba(22,211,95,0.25);
    }

    .hack-grid {
      display: grid;
      grid-template-columns: repeat(10, minmax(44px, 1fr));
      gap: 10px 18px;
      justify-items: center;
      margin: 0 auto 28px;
      max-width: 820px;
    }

    .hack-number {
      font-family: "Courier New", Consolas, monospace;
      font-size: 34px;
      color: #f3f4f6;
      cursor: pointer;
      line-height: 1;
      user-select: none;
      transition: transform 0.1s ease, color 0.12s ease, opacity 0.12s ease;
      min-width: 44px;
      text-align: center;
    }

    .hack-number:hover {
      transform: scale(1.06);
    }

    .hack-number.target {
      color: #ff3b30;
      text-shadow: 0 0 8px rgba(255,59,48,0.2);
    }

    .hack-number.good {
      color: #22c55e;
      opacity: 1;
    }

    .hack-number.bad {
      color: #94a3b8;
      opacity: 0.45;
      pointer-events: none;
    }

    .hack-footer-line {
      width: calc(100% - 40px);
      height: 8px;
      margin: 0 auto;
      background: linear-gradient(90deg, rgba(255,255,255,0.01), rgba(38,38,38,0.4), rgba(255,255,255,0.01));
      border-radius: 999px;
    }

    .hack-status {
      margin-top: 18px;
      color: #cbd5e1;
      font-size: 14px;
      min-height: 22px;
      text-align: center;
    }

    .hack-toolbar {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .hack-btn {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      color: white;
      background: #1d4ed8;
    }

    .hack-btn.secondary {
      background: rgba(255,255,255,0.08);
    }

    @media (max-width: 1100px) {
      .window {
        width: calc(100vw - 80px);
        left: 40px;
      }

      .hack-grid {
        grid-template-columns: repeat(5, minmax(44px, 1fr));
        gap: 12px 16px;
      }

      .hack-ip {
        font-size: 42px;
      }
    }

    @media (max-width: 768px) {
      .login-box {
        width: 90%;
      }

      .session-name {
        font-size: 28px;
      }

      .password-row,
      .login-box button {
        max-width: 100%;
      }

      .window {
        left: 12px;
        top: 70px;
        width: calc(100vw - 24px);
      }

      .taskbar {
        grid-template-columns: 1fr;
        padding: 0 8px;
      }

      .taskbar-left,
      .taskbar-right {
        display: none;
      }

      .usb-notice {
        right: 10px;
        left: 10px;
        bottom: 60px;
      }

      .hack-panel {
        min-height: 500px;
        padding: 14px;
      }

      .hack-heading-main {
        font-size: 16px;
      }

      .hack-heading-sub {
        font-size: 10px;
      }

      .hack-ip {
        font-size: 28px;
      }

      .hack-timer {
        font-size: 22px;
      }

      .hack-grid {
        grid-template-columns: repeat(5, minmax(34px, 1fr));
        gap: 10px 12px;
      }

      .hack-number {
        font-size: 24px;
        min-width: 32px;
      }
    }
  </style>
</head>
<body>
  <section id="login-screen">
    <div class="login-box">
      <div class="session-name">Ethan.morel</div>

      <div class="password-row">
        <span class="lock-icon">🔒</span>
        <input
          type="password"
          id="password-input"
          placeholder="Entrez le mot de passe"
          autocomplete="off"
        />
      </div>

      <button id="login-button" type="button">Se connecter</button>
      <div id="error-message"></div>

      <div class="login-links">
        <a href="#">J'ai oublié mon mot de passe</a>
        <span>|</span>
        <a href="#">Options de connexion</a>
      </div>
    </div>
  </section>

  <section id="desktop-screen" class="hidden">
    <div class="desktop-overlay"></div>

    <div class="desktop-icons">
      <div class="desktop-icon" onclick="openWindow('documents')">
        <span class="emoji">📁</span>
        <span class="label">Documents</span>
      </div>

      <div class="desktop-icon" onclick="openMessagingAccess()">
        <span class="emoji">💬</span>
        <span class="label">Messagerie</span>
      </div>

      <div class="desktop-icon" onclick="openWindow('browser')">
        <span class="emoji">🌐</span>
        <span class="label">Navigateur</span>
      </div>

      <div class="desktop-icon" onclick="openWindow('downloads')">
        <span class="emoji">📥</span>
        <span class="label">Téléchargements</span>
      </div>

      <div id="usb-icon" class="desktop-icon hidden" onclick="openUsbDrive()">
        <span class="emoji">💾</span>
        <span class="label">Clé USB</span>
      </div>
    </div>

    <div id="usb-notice" class="usb-notice hidden">
      Clé USB détectée. Un nouveau support est disponible sur le bureau.
    </div>

    <div id="app-window" class="window hidden">
      <div class="window-header">
        <h2 id="window-title">Fenêtre</h2>
        <button class="close-btn" onclick="closeWindow()">X</button>
      </div>
      <div class="window-content" id="window-content"></div>
    </div>

    <div class="taskbar">
      <div class="taskbar-left"></div>

      <div class="taskbar-center">
        <button class="taskbar-icon" type="button" title="Démarrer">
          <span class="windows-logo">
            <span></span><span></span><span></span><span></span>
          </span>
        </button>

        <button class="taskbar-icon active" type="button" title="Explorateur" onclick="openWindow('documents')">📁</button>
        <button class="taskbar-icon" type="button" title="Messagerie" onclick="openMessagingAccess()">💬</button>
        <button class="taskbar-icon" type="button" title="Navigateur" onclick="openWindow('browser')">🌐</button>
        <button class="taskbar-icon" type="button" title="Téléchargements" onclick="openWindow('downloads')">⬇️</button>
        <button id="taskbar-usb" class="taskbar-icon hidden" type="button" title="Clé USB" onclick="openUsbDrive()">💾</button>
      </div>

      <div class="taskbar-right">
        <div class="taskbar-tray">
          <span title="Réseau">📶</span>
          <span title="Écran">🖥️</span>
          <span title="Volume">🔊</span>
        </div>
        <div class="taskbar-time" id="clock"></div>
      </div>
    </div>
  </section>

  <script>
    const COMPUTER_PASSWORD = "ENTREPOT22";

    const data = {
      documents: {
        title: "Documents",
        content: `
          <p>Répertoire principal de l'utilisateur.</p>
          <div class="folder-grid">
            <div class="folder-item" onclick="showFile('clients')">
              <span class="emoji">📄</span>
              <span class="name">clients.txt</span>
            </div>
            <div class="folder-item" onclick="showFile('planning')">
              <span class="emoji">📄</span>
              <span class="name">planning.txt</span>
            </div>
            <div class="folder-item" onclick="showFile('notes')">
              <span class="emoji">📄</span>
              <span class="name">notes_perso.txt</span>
            </div>
          </div>
          <div id="inner-file-view"></div>
        `
      },
      messages: {
        title: "Messagerie",
        content: `
          <p>Dernières conversations enregistrées sur le poste.</p>
          <div class="file-box">
<strong>Fournisseur :</strong> rdv 22h entrepôt
<strong>Fournisseur :</strong> j'ai la marchandise
<strong>Numéro inconnu :</strong> fais attention aux gendarmes
          </div>
        `
      },
      browser: {
        title: "Historique du navigateur",
        content: `
          <div class="file-box">
- prix kilo cocaïne
- entrepôt abandonné Paleto localisation
- comment effacer historique ordinateur
- téléphone chiffré application
          </div>
        `
      },
      downloads: {
        title: "Téléchargements",
        content: `
          <div class="file-box">
- facture_scan.pdf
- plan_entrepot.jpg
- contact_fournisseur.vcf
          </div>
        `
      }
    };

    const files = {
      clients: `
Nom : Client A — Montant : 5 000€
Nom : Client B — Montant : 12 000€
Nom : Client C — Montant : 3 500€
      `,
      planning: `
Lundi : repérage
Mardi : livraison 22h
Mercredi : encaissement
      `,
      notes: `
Penser à changer de numéro.
Ne pas oublier le rendez-vous à l'entrepôt.
Supprimer les traces après la remise.
      `
    };

    const loginScreen = document.getElementById("login-screen");
    const desktopScreen = document.getElementById("desktop-screen");
    const passwordInput = document.getElementById("password-input");
    const loginButton = document.getElementById("login-button");
    const errorMessage = document.getElementById("error-message");
    const appWindow = document.getElementById("app-window");
    const windowTitle = document.getElementById("window-title");
    const windowContent = document.getElementById("window-content");
    const usbIcon = document.getElementById("usb-icon");
    const usbNotice = document.getElementById("usb-notice");
    const taskbarUsb = document.getElementById("taskbar-usb");

    let messagingUnlocked = false;
    let usbInserted = false;

    let hackTargets = [];
    let hackFound = [];
    let hackTimerInterval = null;
    let hackTimeLeftMs = 49224;
    let hackGameRunning = false;

    loginButton.addEventListener("click", tryLogin);

    passwordInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        tryLogin();
      }
    });

    document.addEventListener("keydown", function(event) {
      if (loginScreen.classList.contains("hidden") && !usbInserted && (event.key === "u" || event.key === "U")) {
        insertUsb();
      }
    });

    function tryLogin() {
      const attempt = passwordInput.value.trim();

      if (attempt === COMPUTER_PASSWORD) {
        errorMessage.textContent = "";
        loginScreen.classList.add("hidden");
        desktopScreen.classList.remove("hidden");
      } else {
        errorMessage.textContent = "Mot de passe incorrect.";
      }
    }

    function openWindow(key) {
      const app = data[key];
      if (!app) return;

      stopHackGame();
      windowTitle.textContent = app.title;
      windowContent.innerHTML = app.content;
      appWindow.classList.remove("hidden");
    }

    function closeWindow() {
      appWindow.classList.add("hidden");
      stopHackGame();
    }

    function showFile(fileKey) {
      const content = files[fileKey];
      const target = document.getElementById("inner-file-view");
      if (!target || !content) return;

      target.innerHTML = `<div class="file-box">${content}</div>`;
    }

    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString("fr-FR", {
        hour: "2-digit",
        minute: "2-digit"
      });
      const date = now.toLocaleDateString("fr-FR");
      document.getElementById("clock").innerHTML = `${time}<br>${date}`;
    }

    function openMessagingAccess() {
      if (messagingUnlocked) {
        openWindow("messages");
        return;
      }

      stopHackGame();
      windowTitle.textContent = "Messagerie";
      windowContent.innerHTML = `
        <div class="status-box">
          <div class="status-title">ACCÈS MESSAGERIE SÉCURISÉ</div>
          <div class="status-text">
            Cette messagerie est protégée par une couche de sécurité renforcée.
            L'entrée d'un mot de passe est requise, mais aucun accès direct n'est autorisé depuis cette session.
            Utilisez un outil externe pour contourner la protection.
          </div>
          <button class="status-btn" onclick="fakePasswordPrompt()">Entrer le mot de passe</button>
          <div id="secure-access-feedback" style="margin-top:14px;color:#cbd5e1;font-size:14px;"></div>
        </div>
      `;
      appWindow.classList.remove("hidden");
    }

    function fakePasswordPrompt() {
      const feedback = document.getElementById("secure-access-feedback");
      if (feedback) {
        feedback.textContent = "Accès refusé. Aucun mot de passe utilisateur valide n'est disponible sur cette session.";
      }
    }

    function insertUsb() {
      usbInserted = true;
      usbIcon.classList.remove("hidden");
      taskbarUsb.classList.remove("hidden");
      usbNotice.classList.remove("hidden");

      setTimeout(() => {
        usbNotice.classList.add("hidden");
      }, 3500);
    }

    function openUsbDrive() {
      stopHackGame();
      windowTitle.textContent = "Clé USB";
      windowContent.innerHTML = `
        <p>Support externe détecté.</p>
        <div class="folder-grid">
          <div class="folder-item" onclick="openHackApp()">
            <span class="emoji">🧩</span>
            <span class="name">messenger_bypass.exe</span>
          </div>
        </div>
      `;
      appWindow.classList.remove("hidden");
    }

    function openHackApp() {
      stopHackGame();
      windowTitle.textContent = "messenger_bypass.exe";
      windowContent.innerHTML = `
        <div class="hack-screen">
          <div class="hack-panel">
            <div class="hack-header">
              <div class="hack-header-left">
                <div class="hack-badge">🔓</div>
                <div class="hack-heading">
                  <div class="hack-heading-main">CONNECTING TO THE HOST</div>
                  <div class="hack-heading-sub">COMPROMISING GLOBAL SECURITY ONE SLIP AT A TIME</div>
                </div>
              </div>

              <div class="hack-signal">
                <span></span><span></span><span></span><span></span><span></span>
              </div>
            </div>

            <div class="hack-ip" id="hack-ip">23.03.29.92</div>
            <div class="hack-timer" id="hack-timer">00:49:224</div>

            <div class="hack-grid" id="hack-grid"></div>

            <div class="hack-footer-line"></div>

            <div class="hack-status" id="hack-status">
              Sélectionnez les 4 anomalies rouges avant la fin du temps.
            </div>

            <div class="hack-toolbar">
              <button class="hack-btn" onclick="startHackNumbersGame()">Lancer le piratage</button>
              <button class="hack-btn secondary" onclick="resetHackNumbersGame()">Réinitialiser</button>
            </div>
          </div>
        </div>
      `;
      appWindow.classList.remove("hidden");
      startHackNumbersGame();
    }

    function startHackNumbersGame() {
      stopHackGame();
      hackGameRunning = true;
      hackFound = [];
      hackTargets = [];
      hackTimeLeftMs = 49224;

      const totalCells = 80;
      const targetCount = 4;
      const numbers = [];

      for (let i = 0; i < totalCells; i++) {
        const value = Math.floor(Math.random() * 100).toString().padStart(2, "0");
        numbers.push(value);
      }

      while (hackTargets.length < targetCount) {
        const randomIndex = Math.floor(Math.random() * totalCells);
        if (!hackTargets.includes(randomIndex)) {
          hackTargets.push(randomIndex);
        }
      }

      const grid = document.getElementById("hack-grid");
      const status = document.getElementById("hack-status");

      if (!grid || !status) return;

      grid.innerHTML = "";

      numbers.forEach((num, index) => {
        const cell = document.createElement("div");
        cell.className = "hack-number";
        cell.textContent = num;
        cell.dataset.index = index;

        if (hackTargets.includes(index)) {
          cell.classList.add("target");
        }

        cell.addEventListener("click", () => handleHackNumberClick(cell, index));
        grid.appendChild(cell);
      });

      status.textContent = "Sélectionnez les 4 anomalies rouges avant la fin du temps.";
      updateHackTimerDisplay();

      hackTimerInterval = setInterval(() => {
        hackTimeLeftMs -= 100;

        if (hackTimeLeftMs <= 0) {
          hackTimeLeftMs = 0;
          updateHackTimerDisplay();
          stopHackGame();
          failHackGame("Temps écoulé. Le contournement a échoué.");
          return;
        }

        updateHackTimerDisplay();
      }, 100);
    }

    function handleHackNumberClick(cell, index) {
      if (!hackGameRunning) return;

      if (hackFound.includes(index)) return;

      if (hackTargets.includes(index)) {
        hackFound.push(index);
        cell.classList.remove("target");
        cell.classList.add("good");

        if (hackFound.length === hackTargets.length) {
          stopHackGame();
          succeedHackGame();
        }
      } else {
        cell.classList.add("bad");
        failHackGame("Mauvaise sélection. La sécurité a rejeté l'injection.");
      }
    }

    function succeedHackGame() {
      messagingUnlocked = true;
      const status = document.getElementById("hack-status");
      if (status) {
        status.textContent = "Contournement réussi. La messagerie est maintenant accessible.";
        status.style.color = "#22c55e";
      }

      setTimeout(() => {
        openWindow("messages");
      }, 900);
    }

    function failHackGame(message) {
      stopHackGame();

      const status = document.getElementById("hack-status");
      if (status) {
        status.textContent = message;
        status.style.color = "#ef4444";
      }
    }

    function resetHackNumbersGame() {
      if (document.getElementById("hack-grid")) {
        startHackNumbersGame();
      }
    }

    function stopHackGame() {
      hackGameRunning = false;

      if (hackTimerInterval) {
        clearInterval(hackTimerInterval);
        hackTimerInterval = null;
      }
    }

    function updateHackTimerDisplay() {
      const timer = document.getElementById("hack-timer");
      if (!timer) return;

      const totalMs = Math.max(0, hackTimeLeftMs);
      const seconds = Math.floor(totalMs / 1000);
      const ms = totalMs % 1000;

      const formattedSeconds = String(seconds).padStart(2, "0");
      const formattedMs = String(ms).padStart(3, "0");

      timer.textContent = `00:${formattedSeconds}:${formattedMs}`;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
