<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poste informatique saisi</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #0b1220;
      color: white;
    }

    .hidden {
      display: none !important;
    }

    /* =========================
       ÉCRAN DE CONNEXION
    ========================= */
    #login-screen {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(135deg, rgba(11,18,32,0.55), rgba(20,30,48,0.45)),
        url("assets/login-screen.jpg") center/cover no-repeat;
    }

    .login-box {
      width: 100%;
      max-width: 520px;
      padding: 32px 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .session-name {
      font-size: 34px;
      font-weight: 500;
      color: #ffffff;
      margin-bottom: 28px;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
    }

    .password-row {
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 10px;
      background: rgba(7, 18, 58, 0.72);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      margin-bottom: 18px;
    }

    .lock-icon {
      font-size: 22px;
      line-height: 1;
      opacity: 0.9;
      flex-shrink: 0;
    }

    .password-row input {
      width: 100%;
      border: none;
      background: transparent;
      color: white;
      font-size: 16px;
      outline: none;
    }

    .password-row input::placeholder {
      color: rgba(255,255,255,0.62);
    }

    .login-box button {
      width: 100%;
      max-width: 420px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #2f5df0, #3a6bff);
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 10px 28px rgba(32, 84, 255, 0.28);
    }

    .login-box button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .login-links {
      margin-top: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      color: rgba(255,255,255,0.72);
      font-size: 14px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    .login-links a {
      color: rgba(255,255,255,0.78);
      text-decoration: none;
    }

    .login-links a:hover {
      text-decoration: underline;
    }

    #error-message {
      min-height: 20px;
      margin-top: 12px;
      color: #f87171;
      font-size: 14px;
    }

    /* =========================
       BUREAU
    ========================= */
    #desktop-screen {
      width: 100%;
      height: 100%;
      position: relative;
      background: url("assets/desktop-bg.png") center/cover no-repeat;
    }

    .desktop-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.08);
      pointer-events: none;
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 42px;
      background: rgba(10, 15, 25, 0.55);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      backdrop-filter: blur(6px);
      z-index: 2;
    }

    .topbar .title {
      font-size: 14px;
      color: #e2e8f0;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .topbar .session {
      font-size: 13px;
      color: #cbd5e1;
    }

    .desktop-icons {
      position: absolute;
      top: 70px;
      left: 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      z-index: 2;
    }

    .desktop-icon {
      width: 92px;
      text-align: center;
      cursor: pointer;
      user-select: none;
    }

    .desktop-icon .emoji {
      font-size: 38px;
      margin-bottom: 6px;
      display: block;
    }

    .desktop-icon .label {
      font-size: 13px;
      line-height: 1.3;
      text-shadow: 0 2px 8px rgba(0,0,0,0.55);
    }

    .window {
      position: absolute;
      top: 100px;
      left: 180px;
      width: 720px;
      max-width: calc(100vw - 220px);
      min-height: 420px;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      z-index: 5;
    }

    .window-header {
      height: 46px;
      background: rgba(30, 41, 59, 0.95);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .window-header h2 {
      font-size: 15px;
      color: #f8fafc;
      font-weight: 600;
    }

    .close-btn {
      border: none;
      background: #ef4444;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .window-content {
      padding: 18px;
      color: #e2e8f0;
    }

    .folder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
      margin-top: 8px;
    }

    .folder-item {
      padding: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .folder-item:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-1px);
    }

    .folder-item span {
      display: block;
    }

    .folder-item .emoji {
      font-size: 34px;
      margin-bottom: 8px;
    }

    .folder-item .name {
      font-size: 14px;
    }

    .file-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 16px;
      margin-top: 14px;
      white-space: pre-line;
      line-height: 1.6;
      font-size: 14px;
    }

    .taskbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 54px;
      background: rgba(10, 15, 25, 0.55);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 3;
      backdrop-filter: blur(8px);
    }

    .start-btn {
      background: rgba(37, 99, 235, 0.95);
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .clock {
      font-size: 13px;
      color: #cbd5e1;
    }

    @media (max-width: 768px) {
      .login-box {
        width: 90%;
      }

      .session-name {
        font-size: 28px;
      }

      .password-row,
      .login-box button {
        max-width: 100%;
      }

      .window {
        left: 20px;
        top: 90px;
        width: calc(100vw - 40px);
      }
    }
  </style>
</head>
<body>
  <section id="login-screen">
    <div class="login-box">
      <div class="session-name">Ethan.morel</div>

      <div class="password-row">
        <span class="lock-icon">🔒</span>
        <input
          type="password"
          id="password-input"
          placeholder="Entrez le mot de passe"
          autocomplete="off"
        />
      </div>

      <button id="login-button" type="button">Se connecter</button>
      <div id="error-message"></div>

      <div class="login-links">
        <a href="#">J'ai oublié mon mot de passe</a>
        <span>|</span>
        <a href="#">Options de connexion</a>
      </div>
    </div>
  </section>

  <section id="desktop-screen" class="hidden">
    <div class="desktop-overlay"></div>

    <div class="topbar">
      <div class="title">SESSION UTILISATEUR — ORDINATEUR PERSONNEL</div>
      <div class="session">Utilisateur : Ethan.morel</div>
    </div>

    <div class="desktop-icons">
      <div class="desktop-icon" onclick="openWindow('documents')">
        <span class="emoji">📁</span>
        <span class="label">Documents</span>
      </div>

      <div class="desktop-icon" onclick="openWindow('messages')">
        <span class="emoji">💬</span>
        <span class="label">Messagerie</span>
      </div>

      <div class="desktop-icon" onclick="openWindow('browser')">
        <span class="emoji">🌐</span>
        <span class="label">Navigateur</span>
      </div>

      <div class="desktop-icon" onclick="openWindow('downloads')">
        <span class="emoji">📥</span>
        <span class="label">Téléchargements</span>
      </div>
    </div>

    <div id="app-window" class="window hidden">
      <div class="window-header">
        <h2 id="window-title">Fenêtre</h2>
        <button class="close-btn" onclick="closeWindow()">X</button>
      </div>
      <div class="window-content" id="window-content"></div>
    </div>

    <div class="taskbar">
      <button class="start-btn">NTECH OS</button>
      <div class="clock" id="clock"></div>
    </div>
  </section>

  <script>
    const COMPUTER_PASSWORD = "ENTREPOT22";

    const data = {
      documents: {
        title: "Documents",
        content: `
          <p>Répertoire principal de l'utilisateur.</p>
          <div class="folder-grid">
            <div class="folder-item" onclick="showFile('clients')">
              <span class="emoji">📄</span>
              <span class="name">clients.txt</span>
            </div>
            <div class="folder-item" onclick="showFile('planning')">
              <span class="emoji">📄</span>
              <span class="name">planning.txt</span>
            </div>
            <div class="folder-item" onclick="showFile('notes')">
              <span class="emoji">📄</span>
              <span class="name">notes_perso.txt</span>
            </div>
          </div>
          <div id="inner-file-view"></div>
        `
      },
      messages: {
        title: "Messagerie",
        content: `
          <p>Dernières conversations enregistrées sur le poste.</p>
          <div class="file-box">
<strong>Fournisseur :</strong> rdv 22h entrepôt
<strong>Fournisseur :</strong> j'ai la marchandise
<strong>Numéro inconnu :</strong> fais attention aux gendarmes
          </div>
        `
      },
      browser: {
        title: "Historique du navigateur",
        content: `
          <div class="file-box">
- prix kilo cocaïne
- entrepôt abandonné Paleto localisation
- comment effacer historique ordinateur
- téléphone chiffré application
          </div>
        `
      },
      downloads: {
        title: "Téléchargements",
        content: `
          <div class="file-box">
- facture_scan.pdf
- plan_entrepot.jpg
- contact_fournisseur.vcf
          </div>
        `
      }
    };

    const files = {
      clients: `
Nom : Client A — Montant : 5 000€
Nom : Client B — Montant : 12 000€
Nom : Client C — Montant : 3 500€
      `,
      planning: `
Lundi : repérage
Mardi : livraison 22h
Mercredi : encaissement
      `,
      notes: `
Penser à changer de numéro.
Ne pas oublier le rendez-vous à l'entrepôt.
Supprimer les traces après la remise.
      `
    };

    const loginScreen = document.getElementById("login-screen");
    const desktopScreen = document.getElementById("desktop-screen");
    const passwordInput = document.getElementById("password-input");
    const loginButton = document.getElementById("login-button");
    const errorMessage = document.getElementById("error-message");
    const appWindow = document.getElementById("app-window");
    const windowTitle = document.getElementById("window-title");
    const windowContent = document.getElementById("window-content");

    loginButton.addEventListener("click", tryLogin);

    passwordInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        tryLogin();
      }
    });

    function tryLogin() {
      const attempt = passwordInput.value.trim();

      if (attempt === COMPUTER_PASSWORD) {
        errorMessage.textContent = "";
        loginScreen.classList.add("hidden");
        desktopScreen.classList.remove("hidden");
      } else {
        errorMessage.textContent = "Mot de passe incorrect.";
      }
    }

    function openWindow(key) {
      const app = data[key];
      if (!app) return;

      windowTitle.textContent = app.title;
      windowContent.innerHTML = app.content;
      appWindow.classList.remove("hidden");
    }

    function closeWindow() {
      appWindow.classList.add("hidden");
    }

    function showFile(fileKey) {
      const content = files[fileKey];
      const target = document.getElementById("inner-file-view");
      if (!target || !content) return;

      target.innerHTML = `<div class="file-box">${content}</div>`;
    }

    function updateClock() {
      const now = new Date();
      const formatted = now.toLocaleString("fr-FR", {
        hour: "2-digit",
        minute: "2-digit",
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      });
      document.getElementById("clock").textContent = formatted;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
